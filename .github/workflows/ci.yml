# Ferropress CI — quality gates (house style: warnings = errors, fmt from day
# one) plus a dependency-graph lint that enforces the architecture invariants
# (core has no rhypedb/rinch/jkbase; rhypedb lives only in the embedded adapter +
# schema-sdl; exactly one render impl) and a zero-upstream portability leg that
# proves ferropress-core builds with no external upstream at all.
name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      # onnx-dynamic means the build does not download ONNX; tests that actually
      # embed need ORT_DYLIB_PATH set in the runner (deferred until vector tests).
      - run: cargo test --workspace

  dep-graph-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Enforces: core depends on no rhypedb/rinch/jkbase; only
      # ferropress-store-embedded touches rhypedb-engine/-subscribe; only
      # ferropress-store-embedded + ferropress-schema-sdl touch rhypedb-schema;
      # all rhypedb-* deps share one git rev; no rinch dep in any workspace member
      # (rinch is used only by the EXCLUDED ferropress-islands wasm crate).
      - run: cargo run --manifest-path xtask/Cargo.toml -- dep-graph-lint

  # The public-site wasm islands crate (ferropress-islands) is EXCLUDED from the
  # workspace, so the --workspace jobs above never touch it. Lint + build it for
  # wasm32 and run wasm-bindgen so it can't silently rot. The wasm-bindgen CLI
  # version MUST match the crate's `wasm-bindgen` dependency — bump both together.
  islands-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            crates/ferropress-islands
      - run: cargo clippy --manifest-path crates/ferropress-islands/Cargo.toml --target wasm32-unknown-unknown -- -D warnings
      - run: cargo install wasm-bindgen-cli --version 0.2.125 --locked
      - run: cargo run --manifest-path xtask/Cargo.toml -- build-islands

  # Reference WASM plugins (Extism PDK) are EXCLUDED from the workspace, so the
  # --workspace jobs don't cover them. Lint + build them for wasm32, then run the
  # plugin-host integration test (which loads the built wasm — the extism ABI
  # conformance proof; it skips in the plain `test` job where plugins aren't built).
  plugins-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            plugins/callout
      - run: cargo clippy --manifest-path plugins/callout/Cargo.toml --target wasm32-unknown-unknown -- -D warnings
      - run: cargo run --manifest-path xtask/Cargo.toml -- build-plugins
      - run: cargo test -p ferropress-plugin-host

  # Portability boundary: ferropress-core must build entirely on its own, naming
  # ZERO external upstream (no rhypedb, no rinch, no jkbase). Building just this
  # package — and nothing else in the workspace — proves the boundary holds.
  zero-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p ferropress-core
